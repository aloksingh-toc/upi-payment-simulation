spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/upi_payment
    username: ${POSTGRES_USER:upi_user}
    password: ${POSTGRES_PASSWORD}

# Swagger UI is OFF by default in Docker/production.
# Set SWAGGER_ENABLED=true only for local debugging.
springdoc:
  api-docs:
    enabled: ${SWAGGER_ENABLED:false}
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:false}
