spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/upi_payment
    username: ${DB_USERNAME:upi_user}
    password: ${DB_PASSWORD:CHANGE_ME_LOCAL}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    # baseline-on-migrate must be opted-in explicitly — do NOT enable by default
    # as it can mask schema inconsistencies on existing databases.
    baseline-on-migrate: ${FLYWAY_BASELINE_ON_MIGRATE:false}
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false

server:
  port: 8080
  tomcat:
    max-http-form-post-size: 1MB

# Both values MUST be supplied via environment variables in any non-local environment.
# The application will refuse to start if they are absent.
app:
  api-key: ${APP_API_KEY}
  webhook:
    secret: ${WEBHOOK_SECRET}
  async:
    webhook:
      core-pool-size: 5
      max-pool-size: 20
      queue-capacity: 200
      await-termination-seconds: 30

springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: false
  swagger-ui:
    path: /swagger-ui.html
    enabled: false
    display-request-duration: true
    tags-sorter: alpha
    operations-sorter: alpha
    try-it-out-enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

logging:
  level:
    com.upi.payment: INFO
    org.springframework.security: WARN
